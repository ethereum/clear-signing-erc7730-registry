name: ✨ master

on:
  push:
    branches:
      - master

permissions:
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_descriptors:
    name: 🔎 validate descriptors
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        timeout-minutes: 10
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup python
        timeout-minutes: 10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ERC-7730 library
        timeout-minutes: 10
        run: pip install erc7730

      - name: Validate ERC-7730 descriptors
        timeout-minutes: 10
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          # Lint only root descriptors. Exclude the *.tests.json fixtures,
          # which are not ERC-7730 descriptors and fail descriptor validation.
          FILES=$(find registry -type f \( -name 'calldata-*.json' -o -name 'eip712-*.json' \) \
            -not -name '*.tests.json')
          erc7730 lint $FILES --gha
