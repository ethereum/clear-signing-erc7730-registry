---
name: 🤖 format descriptors

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BRANCH: "master"

jobs:
  format:
    name: format descriptors
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        timeout-minutes: 10
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get date
        timeout-minutes: 10
        run: echo "CURRENT_DATE=$(date +"%Y-%m-%d %H:%M")" >> $GITHUB_ENV

      - name: Setup python
        timeout-minutes: 10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ERC-7730 library
        timeout-minutes: 10
        run: pip install erc7730

      - name: Format ERC-7730 descriptors
        timeout-minutes: 10
        run: erc7730 format

      - name: Check changes
        id: changes
        timeout-minutes: 10
        shell: bash
        run: |
          [[ -n "$(git status -s)" ]] && echo "changes=true" >> $GITHUB_OUTPUT || true

      - name: Open pull request
        if: ${{ !cancelled() && steps.changes.outputs.changes == 'true' }}
        timeout-minutes: 10
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH }}-format-descriptors
          base: ${{ env.BRANCH }}
          delete-branch: false
          commit-message: "chore: format descriptors - ${{ env.CURRENT_DATE }}"
          title: "chore: format descriptors - ${{ env.CURRENT_DATE }}"
          body: |
            Automated `erc7730 format` of the registry descriptors - ${{ env.CURRENT_DATE }}.
          draft: false
          signoff: false
