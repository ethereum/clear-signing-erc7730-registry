name: 🏷️ pull request labels

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup_pull_request:
    name: 🤖 setup pull request
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        timeout-minutes: 10
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Add labels
        timeout-minutes: 5
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6
        with:
          sync-labels: true

      - name: Enforce labels
        timeout-minutes: 5
        uses: mheap/github-action-required-labels@0ac283b4e65c1fb28ce6079dea5546ceca98ccbe # v5
        with:
          mode: minimum
          count: 1
          labels: |
            documentation
            specifications
            descriptors
            ci
            tools
          add_comment: true
