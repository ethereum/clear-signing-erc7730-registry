name: Run Rust (llbartekll/clear-signing) clear-signing tests
description: Clone and build llbartekll/clear-signing's cs-test binary, run it against a .tests.json fixture, and produce a results.json conforming to the format in .github/test-results/.

inputs:
  test-file:
    description: Absolute path to the .tests.json fixture.
    required: true
  output:
    description: Absolute path where results.json should be written.
    required: true

outputs:
  results-path:
    description: Path to the produced results.json.
    value: ${{ inputs.output }}

runs:
  using: composite
  steps:
    - name: Checkout cs-test
      uses: actions/checkout@v6.0.2
      with:
        # TODO: switch to the upstream llbartekll/clear-signing repo+ref once merged.
        repository: manuelwedler/llbartekll-clear-signing
        ref: cs-test-results-json
        path: rust-test-runner
        persist-credentials: false

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust-test-runner

    - name: Build cs-test
      shell: bash
      working-directory: rust-test-runner
      run: cargo build --release -p cs-test

    - name: Run tests
      shell: bash
      working-directory: rust-test-runner
      env:
        TEST_FILE: ${{ inputs.test-file }}
        OUTPUT: ${{ inputs.output }}
      run: ./target/release/cs-test run "$TEST_FILE" --output "$OUTPUT"
