name: Run Rust (llbartekll/clear-signing) clear-signing tests
description: Install llbartekll/clear-signing's cs-test binary via cargo, run it against a .tests.json fixture, and produce a results.json conforming to the format in .github/test-runner-docs/.

inputs:
  test-file:
    description: Absolute path to the .tests.json fixture.
    required: true
  output:
    description: Absolute path where results.json should be written.
    required: true

outputs:
  results-path:
    description: Path to the produced results.json.
    value: ${{ inputs.output }}

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

    - name: Install cs-test
      shell: bash
      # Pinned to a specific commit on the fork carrying the array-shape
      # expected.fields support — keeps CI runs deterministic.
      # TODO: switch back to upstream llbartekll/clear-signing once it
      # adopts the array shape (see fork branch `array-shape-expected-fields`).
      run: |
        cargo install --git https://github.com/manuelwedler/llbartekll-clear-signing \
          --rev 2da7eafb21dd7a75ddfe4501361756da3a24751c --locked cs-test

    - name: Run tests
      shell: bash
      env:
        TEST_FILE: ${{ inputs.test-file }}
        OUTPUT: ${{ inputs.output }}
      run: cs-test run "$TEST_FILE" --output "$OUTPUT"
