name: Run Rust (llbartekll/clear-signing) clear-signing tests
description: Clone and build llbartekll/clear-signing's cs-test binary, run it against a .tests.json fixture, and produce a results.json conforming to the format in .github/test-runner-docs/.

inputs:
  test-file:
    description: Absolute path to the .tests.json fixture.
    required: true
  output:
    description: Absolute path where results.json should be written.
    required: true

outputs:
  results-path:
    description: Path to the produced results.json.
    value: ${{ inputs.output }}

runs:
  using: composite
  steps:
    - name: Checkout cs-test
      shell: bash
      # Plain git clone (not actions/checkout) — the cs-test-results-json branch
      # has a leftover .claude/worktrees/ directory that looks like a submodule
      # but isn't in .gitmodules, which makes actions/checkout's post-step
      # `git submodule foreach` fail. We then nuke .claude/ so cargo doesn't
      # see anything weird either.
      # TODO: switch back to actions/checkout (and to upstream
      # llbartekll/clear-signing) once that branch is cleaned up.
      run: |
        git clone --depth 1 --branch cs-test-results-json \
          https://github.com/manuelwedler/llbartekll-clear-signing.git \
          rust-test-runner
        rm -rf rust-test-runner/.claude

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust-test-runner

    - name: Build cs-test
      shell: bash
      working-directory: rust-test-runner
      run: cargo build --release -p cs-test

    - name: Run tests
      shell: bash
      working-directory: rust-test-runner
      env:
        TEST_FILE: ${{ inputs.test-file }}
        OUTPUT: ${{ inputs.output }}
      run: ./target/release/cs-test run "$TEST_FILE" --output "$OUTPUT"
